name: Feature request
description: Suggest an improvement for Eta language support.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Concrete Eta examples are the fastest way to explain the workflow.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the missing workflow, Eta feature, or editor behavior.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Tell us what the extension should do.
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example
      description: Add a template, render call, or settings example if relevant.
      render: ts
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or alternate design you considered.
    validations:
      required: false
